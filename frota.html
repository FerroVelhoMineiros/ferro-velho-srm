<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrotaControl - Sistema de Gestão de Frota</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .nav-link-home:hover {
            color: white !important;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-truck-fast logo-icon"></i>
                <h2>FrotaControl</h2>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link-home"
                    style="padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; color: var(--text-secondary); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 0.5rem; transition: all 0.2s;">
                    <i class="fa-solid fa-arrow-left"></i> Menu Principal
                </a>
                <a href="#" class="nav-item active" data-target="dashboard">
                    <i class="fa-solid fa-chart-pie"></i> Visualização
                </a>
                <a href="#" class="nav-item" data-target="vehicles">
                    <i class="fa-solid fa-car"></i> Veículos
                </a>
                <a href="#" class="nav-item" data-target="drivers">
                    <i class="fa-solid fa-id-card"></i> Motoristas
                </a>
                <a href="#" class="nav-item" data-target="fuel">
                    <i class="fa-solid fa-gas-pump"></i> Combustível
                </a>
                <a href="#" class="nav-item" data-target="tires">
                    <i class="fa-solid fa-ring"></i> Pneus
                </a>
                <a href="#" class="nav-item" data-target="parts">
                    <i class="fa-solid fa-boxes-stacked"></i> Peças
                </a>
                <a href="#" class="nav-item" data-target="maintenance">
                    <i class="fa-solid fa-wrench"></i> Manutenções
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="importDataBtn" class="btn btn-secondary btn-sm" title="Importar dados">
                    <i class="fa-solid fa-download"></i> Backup
                </button>
                <div class="user-info">
                    <div class="avatar">A</div>
                    <div class="details">
                        <span class="name">Admin</span>
                        <span class="role">Gestor de Frota</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Buscar veículo por placa...">
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn notification-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge" id="alertBadge" style="display: none;">0</span>
                    </button>
                </div>
            </header>

            <div id="views-container" class="views-wrapper">
                <!-- Views will be dynamically injected here via JS -->
                <div id="loading" class="loading-state">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    <p>Carregando sistema...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js?v=202603061747"></script>
    <script src="js/ui.js?v=202603061747"></script>
    <!-- Módulos -->
    <script src="js/modules/dashboard.js?v=202603061747"></script>
    <script src="js/modules/vehicles.js?v=202603061747"></script>
    <script src="js/modules/drivers.js?v=202603061747"></script>
    <script src="js/modules/fuel.js?v=202603061825"></script>
    <script src="js/modules/tires.js?v=202603061805"></script>
    <script src="js/modules/parts.js?v=202603061747"></script>
    <script src="js/modules/maintenance.js?v=202603061811"></script>
    <script src="js/app.js?v=202603061747"></script>
</body>

</html>
