<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conciliação de Cargas - Ferro Velho SRM</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .nav-link-home:hover {
            color: white !important;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Tema azul para diferenciar do módulo de Frota */
        .sidebar {
            background: #0f172a;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-header {
            color: #3b82f6;
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: #3b82f6;
            color: white;
        }

        .nav-item.active i {
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-scale-balanced logo-icon"></i>
                <h2>Conciliação</h2>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link-home"
                    style="padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; color: var(--text-secondary); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 0.5rem; transition: all 0.2s;">
                    <i class="fa-solid fa-arrow-left"></i> Menu Principal
                </a>

                <a href="#" class="nav-item active" data-target="dashboard_conciliacao">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-target="notas_fiscais">
                    <i class="fa-solid fa-file-invoice-dollar"></i> Notas Fiscais
                </a>

                <a href="#" class="nav-item" data-target="importacao">
                    <i class="fa-solid fa-file-import"></i> Importação de Dados
                </a>
                <a href="#" class="nav-item" data-target="conciliacao_notas">
                    <i class="fa-solid fa-magnifying-glass-chart"></i> Conciliação de Notas
                </a>

                <a href="#" class="nav-item" data-target="relatorios">
                    <i class="fa-solid fa-file-excel"></i> Relatórios
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">FV</div>
                    <div class="details">
                        <span class="name">Gestão Gerdau</span>
                        <span class="role">Administrador</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Buscar por número da nota ou placa...">
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn notification-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge" id="alertBadge" style="display: none;">0</span>
                    </button>
                </div>
            </header>

            <div id="views-container" class="views-wrapper">
                <!-- Views will be dynamically injected here via JS -->
                <div id="loading" class="loading-state">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    <p>Carregando sistema...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Módulos da Conciliação -->
    <script src="js/modules/conciliacao_import.js"></script>
    <script src="js/modules/conciliacao_notas.js"></script>
    <script src="js/modules/conciliacao_notas_crud.js"></script>

    <script src="js/modules/conciliacao_dashboard.js"></script>

    <!-- Roteador -->
    <script src="js/app_conciliacao.js"></script>
</body>

</html>
